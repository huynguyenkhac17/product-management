server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/product_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password:                # mysql qua XAMPP nên mặc định không có password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update     # tự tạo / cập nhật bảng theo Entity, không xóa dữ liệu cũ
    show-sql: true
    properties:
      hibernate:
        format_sql: true   # format SQL cho dễ đọc

  # Bật dev-server cho phép frontend React (chạy ở localhost:5173) gọi API sang đây
  mvc:
    cors:
      allowed-origins: "http://localhost:5173"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"

  app:
  jwt:
    secret: "secretKeyMustBeAtLeast32CharIsOk"
    expiration-ms: 86400000
  auth:
    username: admin
    password: admin123
    user-id: 1
